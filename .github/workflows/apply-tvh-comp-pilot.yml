name: Apply TVH Comp Pilot (in-stock)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no Stripe/Supabase writes)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cursor/tvh-comp-pilot-apply-5146

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Apply in-stock Buy Now prices
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/pricing/apply-tvh-comp-pilot-instock.ts --dry-run
          else
            npx tsx scripts/pricing/apply-tvh-comp-pilot-instock.ts
          fi
